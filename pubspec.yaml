name: stellar_pages
description: A universe of stories at your fingertips.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Ebook reading
  epub_view: ^3.2.0

  # File picking
  file_picker: ^8.0.0+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  uuid: ^4.4.0
  google_fonts: ^6.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/sample/
